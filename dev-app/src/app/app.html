<h1>Welcome to the dev app!</h1>

@if (ifCond() > 1000) {
  <h2>IF</h2>
} @else if (ifCond()) {
  <h3>ELSE IF</h3>
} @else if (!ifCond()) {
  <h3>Another else</h3>
} @else {
  <h4>ELSE</h4>
}

@switch (switchCond()) {
  @default {
    <p>SWITCH default</p>
  }
  @case ('a') {
    <h5>SWITCH A</h5>
  }
  @case ('test') {
    <h6>SWITCH B</h6>
  }
  @case ('c') {
    <h6>SWITCH C</h6>
  }
}

<router-outlet />
